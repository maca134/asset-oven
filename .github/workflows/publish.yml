name: Publish

on:
    push:
        tags: ["v*"]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bunx eslint .

            - name: Format check
              run: bunx prettier --check .

            - name: Test
              run: bun test

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Update npm
              run: npm install -g npm@latest

            - name: Publish (npm, trusted publishing via OIDC)
              working-directory: asset-oven
              run: npm publish --provenance
