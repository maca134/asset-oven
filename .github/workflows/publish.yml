name: Publish

on:
    push:
        tags: ["v*"]

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bunx eslint .

            - name: Format check
              run: bunx prettier --check .

            - name: Test
              run: bun test

            - name: Publish
              working-directory: asset-oven
              run: bun publish
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
